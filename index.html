<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | theuicode.com</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Six+Caps&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            overflow: hidden;
        }

        .container {
            background: linear-gradient(to bottom right, #F0E9F3, #C9BED0);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg {
            position: relative;
            width: 1024px;
            height: 600px;
            background: #1B181F;
            box-shadow: 20px 20px 35px 1px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .small-title {
            font-family: "Six Caps", sans-serif;
            letter-spacing: 5px;
            font-size: 20px;
            color: #F2F2F3;
            padding: 20px;
        }

        .circle-row {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 100px;
            position: relative;
        }

        .circle {
            width: 400px;
            height: 400px;
            background: linear-gradient(to bottom, #262234 0%, #1B181F 40%);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-glow {
            width: 350px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(
                to right,
                #5d035c,
                #922346,
                #f1647e,
                #922346,
                #5d035c
            );
            position: absolute;
            bottom: 135px;
            filter: blur(30px);
        }

        .title {
            font-family: "Nunito Sans", sans-serif;
            color: #F2F2F3;
            font-weight: 800;
            font-size: 48px;
            letter-spacing: 12px;
            position: absolute;
            bottom: 240px;
            text-align: center;
        }

        .notify-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            margin-top: -150px;
            width: 100%;
        }

        .notify-label {
            font-family: "Nunito Sans", sans-serif;
            color: #B16573;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .notify-action {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        input.email {
            background: #121113;
            border: none;
            outline: none;
            border-radius: 20px;
            height: 45px;
            width: 350px;
            padding-left: 20px;
            color: #F2F2F3;
        }

        input.email::placeholder {
            color: #888;
        }

        .notify-btn {
            background: linear-gradient(
                to right,
                #2F2C40 0%,
                #2F2C40 50%,
                #5d035c 50%,
                #f1647e
            );
            border: none;
            border-radius: 20px;
            padding: 13px 20px;
            color: #9689B1;
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 2px;
            margin-left: -30px;
            cursor: pointer;
            background-size: 200%;
            background-position: 0% 100%;
            transition: background-position 0.3s ease-out,
                        color 0.3s ease-out;
        }

        .notify-btn:hover {
            background-position: 100% 100%;
            color: #F2F2F3;
        }

        @media (max-width: 768px) {
            .bg {
                width: 95%;
                height: auto;
                padding-bottom: 80px;
            }

            .circle {
                width: 280px;
                height: 280px;
            }

            .title {
                font-size: 28px;
                letter-spacing: 6px;
                bottom: 170px;
            }

            .notify-action {
                flex-direction: column;
                gap: 10px;
            }

            .notify-btn {
                margin-left: 0;
            }

            input.email {
                width: 80%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="bg">

        <h3 class="small-title">HENDRUNG</h3>

        <div class="circle-row">
            <div class="circle-glow"></div>
            <div class="circle"></div>
            <h1 class="title">COMING SOON</h1>
        </div>

        <div class="notify-section">
            <h1 class="notify-label">
                GET NOTIFIED WHEN IT'S READY
            </h1>

            <div class="notify-action">
                <input
                    type="email"
                    class="email"
                    placeholder="ENTER YOUR EMAIL"
                >

                <button class="notify-btn">
                    NOTIFY ME
                </button>
            </div>
        </div>

    </div>
</div>

</body>
</html>
